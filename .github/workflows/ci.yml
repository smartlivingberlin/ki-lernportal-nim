name: CI

on:
  push:
    branches:
      - main
      - "fix/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web install, build, lint and smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22.22.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.13.0

      - name: Verify pinned toolchain
        shell: bash
        run: |
          set -euo pipefail

          NODE_VERSION="$(node --version)"
          PNPM_VERSION="$(pnpm --version)"

          echo "NODE_VERSION=$NODE_VERSION"
          echo "PNPM_VERSION=$PNPM_VERSION"

          test "$NODE_VERSION" = "v22.22.1"
          test "$PNPM_VERSION" = "11.13.0"

          echo "PINNED_TOOLCHAIN=PASS"

      - name: GitHub governance policy check
        run: pnpm governance:check

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate S51A package boundaries
        run: pnpm packages:boundaries

      - name: Typecheck S51A packages
        run: pnpm packages:typecheck

      - name: Test S51B-B database runtime with local fakes
        run: pnpm test:s51b-b-db-runtime

      - name: Supply-chain policy check
        run: pnpm supply-chain:check

      - name: Dependency vulnerability audit
        run: pnpm audit

      - name: Production dependency vulnerability audit
        run: pnpm audit --prod

      - name: Build web app and package standalone assets
        run: pnpm --filter web build

      - name: Verify standalone asset package
        run: pnpm --filter web verify:standalone-assets

      - name: Lint web app
        run: pnpm --filter web lint

      - name: Content quality check
        run: pnpm content:check

      - name: Source and lesson integrity check
        run: pnpm source:check

      - name: Install Playwright Chromium
        shell: bash
        run: |
          set -euo pipefail
          INSTALL_LOG="$RUNNER_TEMP/playwright-install.log"

          if ! pnpm exec playwright install --with-deps chromium > "$INSTALL_LOG" 2>&1; then
            cat "$INSTALL_LOG"
            exit 1
          fi

          echo "PLAYWRIGHT_RUNTIME_READY=YES"

      - name: Start local web server
        shell: bash
        run: |
          set -euo pipefail

          RUNNER_TRACKING_ID="" nohup pnpm --filter web start > "$RUNNER_TEMP/ki-lernportal-web.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/ki-lernportal-web.pid"

          READY=NO
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error http://127.0.0.1:3000/ > /dev/null; then
              READY=YES
              break
            fi
            sleep 1
          done

          if [ "$READY" != "YES" ]; then
            echo "Local web server did not become ready."
            tail -n 80 "$RUNNER_TEMP/ki-lernportal-web.log" || true
            exit 1
          fi

          echo "LOCAL_WEB_READY=YES"

      - name: "Regression: responsive, hydration and accessibility"
        run: BASE_URL=http://127.0.0.1:3000 pnpm test:s48b-a11y

      - name: "Regression: approved sources for all lessons"
        run: BASE_URL=http://127.0.0.1:3000 pnpm test:s48c-sources

      - name: "Regression: practice engine across all lessons"
        shell: bash
        env:
          S49D_BASE_URL: http://127.0.0.1:3000
          S49D_ARTIFACT_DIR: ${{ runner.temp }}/s49d
        run: |
          set -euo pipefail

          AXE_PATH="$(
            node -p "const path=require('node:path'); require.resolve('axe-core/axe.min.js',{paths:[path.dirname(require.resolve('@axe-core/playwright'))]})"
          )"

          test -f "$AXE_PATH"
          mkdir -p "$S49D_ARTIFACT_DIR"

          S49D_AXE_PATH="$AXE_PATH" pnpm test:s49d-practice-ui

      - name: "Smoke: start state 0/12"
        run: BASE_URL=http://127.0.0.1:3000 SMOKE_PHASE=start node scripts/check-local-progress.cjs

      - name: "Smoke: browser JavaScript assets"
        run: BASE_URL=http://127.0.0.1:3000 SMOKE_PHASE=assets node scripts/check-local-progress.cjs

      - name: "Smoke: click updates progress to 1/12"
        run: BASE_URL=http://127.0.0.1:3000 SMOKE_PHASE=click node scripts/check-local-progress.cjs

      - name: "Smoke: click persists lesson l1"
        run: BASE_URL=http://127.0.0.1:3000 SMOKE_PHASE=storage node scripts/check-local-progress.cjs

      - name: "Smoke: module progress 1/3"
        run: BASE_URL=http://127.0.0.1:3000 SMOKE_PHASE=module node scripts/check-local-progress.cjs

      - name: "Smoke: lesson done status"
        run: BASE_URL=http://127.0.0.1:3000 SMOKE_PHASE=status node scripts/check-local-progress.cjs

      - name: "Smoke: reload local progress"
        run: BASE_URL=http://127.0.0.1:3000 SMOKE_PHASE=reload node scripts/check-local-progress.cjs

      - name: "Smoke: undo progress"
        run: BASE_URL=http://127.0.0.1:3000 SMOKE_PHASE=undo node scripts/check-local-progress.cjs

      - name: "Smoke: two lessons 2/12"
        run: BASE_URL=http://127.0.0.1:3000 SMOKE_PHASE=two node scripts/check-local-progress.cjs

      - name: "Smoke: reset progress"
        run: BASE_URL=http://127.0.0.1:3000 SMOKE_PHASE=reset node scripts/check-local-progress.cjs

      - name: "Smoke: cross-tab storage removal"
        run: BASE_URL=http://127.0.0.1:3000 SMOKE_PHASE=cross-tab-clear node scripts/check-local-progress.cjs

      - name: "Smoke: private-demo UI guardrails"
        run: BASE_URL=http://127.0.0.1:3000 SMOKE_PHASE=guardrails node scripts/check-local-progress.cjs

      - name: Stop local web server
        if: always()
        shell: bash
        run: |
          if [ -f "$RUNNER_TEMP/ki-lernportal-web.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/ki-lernportal-web.pid")" 2>/dev/null || true
          fi
          echo "===== LOCAL WEB LOG ====="
          tail -n 80 "$RUNNER_TEMP/ki-lernportal-web.log" || true
