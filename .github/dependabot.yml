version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"

    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Berlin"

    open-pull-requests-limit: 4
    rebase-strategy: "auto"
    versioning-strategy: "increase-if-necessary"

    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"

    allow:
      - dependency-type: "direct"
        update-types:
          - "version-update:semver-patch"

    groups:
      runtime-patches:
        dependency-type: "production"
        patterns:
          - "next"
          - "react"
          - "react-dom"
        update-types:
          - "patch"

      next-tooling-patches:
        dependency-type: "development"
        patterns:
          - "eslint"
          - "eslint-config-next"
        update-types:
          - "patch"

      browser-test-patches:
        dependency-type: "development"
        patterns:
          - "playwright"
          - "@axe-core/playwright"
        update-types:
          - "patch"

      styling-and-types-patches:
        dependency-type: "development"
        patterns:
          - "@tailwindcss/postcss"
          - "tailwindcss"
          - "@types/*"
          - "typescript"
        update-types:
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"

    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:30"
      timezone: "Europe/Berlin"

    open-pull-requests-limit: 2
    rebase-strategy: "auto"

    commit-message:
      prefix: "chore(actions)"
      include: "scope"

    groups:
      github-actions:
        patterns:
          - "*"
